<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Explorer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Header -->

    <header class="header">
        <div class="header-content">
            <div class="logo">
                <span class="logo-icon">🛍️</span>
                <h1>Product Explorer</h1>
            </div>
            <p class="tagline">Discover amazing products</p>
        </div>
    </header>
    <header class="fk-header">

    <!-- TOP BAR -->
    <div class="fk-top">
        <div class="fk-left">
            <div class="fk-logo">
                <span class="logo-icon">🛒</span>
                <span class="logo-text">Products</span>
            </div>

            <div class="fk-categories">
                <div class="pill">💄 Makeup</div>
                <div class="pill">🛒 Grocery</div>
            </div>
        </div>

        <div class="fk-right">
            <div class="location">🏢 Address</div>
            <div class="coins">⚡ 0</div>
        </div>
    </div>

    <!-- SEARCH BAR -->
    <div class="fk-search-row">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" placeholder="Search for Products, Brands and More">
        </div>

        <div class="fk-actions">
            <span>👤 Account</span>
            <span>⋮ More</span>
            <span>🛒 Cart</span>
        </div>
    </div>

</header>

    <!-- Main Content -->
    <main class="main-content">
        
        <!-- Controls Section -->
        <div class="controls">
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="search" placeholder="Search products...">
            </div>
            
            <select id="filter">
                <option value="all">All Categories</option>
                <option value="smartphones">Smartphones</option>
                <option value="laptops">Laptops</option>
                <option value="fragrances">Fragrances</option>
                <option value="skincare">Skincare</option>
                <option value="groceries">Groceries</option>
            </select>
            
            <select id="sort">
                <option value="default">Sort By</option>
                <option value="az">Name (A-Z)</option>
                <option value="za">Name (Z-A)</option>
                <option value="price-low">Price: Low to High</option>
                <option value="price-high">Price: High to Low</option>
            </select>
        </div>

        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Loading products...</p>
        </div>

        <!-- Data container -->
        <div id="container"></div>

        <!-- No Results -->
        <div class="no-results" id="noResults">
            <span class="no-results-icon">🔍</span>
            <h3>No products found</h3>
            <p>Try adjusting your search or filters</p>
        </div>

    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-container">

        <div class="footer-links">
            <span>🛒 Become a Seller</span>
            <span>📢 Advertise</span>
            <span>🎁 Gift Cards</span>
            <span>❓ Help Center</span>
        </div>

        <div class="footer-right">
            <p>© 2007-2026 Flipkart.com</p>

            <div class="payments">
                <img src="https://img.icons8.com/color/48/visa.png" />
                <img src="https://img.icons8.com/color/48/mastercard.png" />
                <img src="https://img.icons8.com/color/48/rupay.png" />

            </div>
        </div>

      </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
