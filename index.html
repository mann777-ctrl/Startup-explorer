<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopX</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="left">
    <div class="logo">🛒 ShopX</div>
    <div class="search-box">
      <input type="text" id="search" placeholder="Search products...">
    </div>
  </div>

  <div class="actions">
    <button class="btn" onclick="goToSignup()">Sign Up</button>
    <button class="btn" id="cartBtn">🛒 Cart <span id="cartCount">0</span></button>

    <!-- DARK MODE -->
    <label class="switch">
      <input type="checkbox" id="themeToggle">
      <span class="slider"></span>
    </label>
  </div>
</header>

<!-- QUOTE BANNER -->
<div class="quote-banner" id="quoteBanner">
  <p id="quoteText">Loading quote...</p>
  <button class="quote-btn" onclick="newQuote()">New Quote 🔄</button>
</div>

<!-- CONTROLS -->
<div class="controls">
  <select id="filter">
    <option value="all">All Categories</option>
  </select>

  <select id="sort">
    <option value="default">Sort By</option>
    <option value="price-low">💰 Low to High</option>
    <option value="price-high">💎 High to Low</option>
    <option value="rating">⭐ Top Rated</option>
  </select>

  <div class="stats" id="stats"></div>
</div>

<!-- PRODUCTS -->
<main>
  <div id="container"></div>
  <div class="no-results" id="noResults">❌ No results found</div>
</main>

<!-- CART MODAL -->
<div class="modal-overlay" id="cartModal">
  <div class="modal">
    <h2>🛒 Your Cart</h2>
    <div id="cartItems"></div>
    <div class="cart-total" id="cartTotal"></div>
    <button class="btn" onclick="closeCart()">Close</button>
    <button class="btn" onclick="clearCart()">Clear Cart</button>
  </div>
</div>

<!-- FOOTER -->
<footer class="footer">
  <p>© 2026 ShopX | Made by Mann</p>
</footer>

<script src="script.js"></script>
</body>
</html>
