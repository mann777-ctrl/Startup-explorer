<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>

<link rel="stylesheet" href="signup.css">
</head>
<body>

<form class="form">
  <div class="title">
    Welcome,<br>
    <span>sign up to continue</span>
  </div>

  <input type="email" placeholder="Email" class="input" required>
  <input type="password" placeholder="Password" class="input" required>

  <div class="login-with">
    <div class="button-log"></div>

    <div class="button-log">
      <svg class="icon" viewBox="0 0 56.6934 56.6934">
        <path d="M51.981,24.48h-23.15v9.6h13.4c-1.1,6-6.5,10-12.3,10-7.4,0-13.4-6-13.4-13.4s6-13.4,13.4-13.4c3.6,0,6.8,1.4,9.2,3.7l6.9-6.9C42.6,6,35.9,3.5,29.9,3.5,15.5,3.5,4,15,4,29.4s11.5,25.9,25.9,25.9c13,0,24-9.3,24-25.9,0-1.7-.2-3.3-.5-4.9z"/>
      </svg>
    </div>

    <div class="button-log">
      <svg class="icon" viewBox="0 0 56.693 56.693">
        <path d="M40.43,21.739h-7.645v-5.014c0-1.883,1.248-2.322,2.127-2.322h5.395V6.125h-7.43c-8.248,0-10.125,6.174-10.125,10.125v5.518h-4.77v8.53h4.77v24.137h10.033V30.298h6.77l1.645-8.559z"/>
      </svg>
    </div>
  </div>

  <button class="button-confirm">Let’s go →</button>
</form>

</body>
</html>
